<!DOCTYPE html>

            integrity="sha512-M5Kq4YVQrjg5c2wsZSn27Dkfm/2ALfxmun0vUE3mPiJyK53hQBHYCVAtvMYEC7ZXmYLg8DVG4tF8gD27WmDbsg=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="style.css">

    <body>
        <!-- Navbar Start -->
        <nav class="navbar">
            <div>
                <h1 class="logo">Logo</h1>
            </div>
            <div> <ul class="nav-link">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Services</a></li>

                    <li><a href="#">Contact Us</a></li>

            <div> <button class="user_btn" type="button">Username</button></div>

            <input type="checkbox" id="menu-toggle">

        <!-- Navbar End -->

        <!-- main Section start -->
        <section class="book_service_container">

            <div class="book_service">

                    <h1>Revitalize Your Clothes with Expert</h1>
                    <p> Laundry Services!</p>
                </div>
                <div class="book_service_para">
                    <p>From premium dry cleaning to swift wash and fold,

                        rediscover the freshness of your clothes today!</p>
                </div>
                <div class="book_service_btn">
                    <button type="button">Book a service today !</button>
                </div>
            </div>
            <!-- left Container end -->
            <!-- Right Container start -->
            <div class="book_service_img">
                <img src="laundrayImg.jpeg" alt="Laundary Image">
            </div>
            <!-- Right Container end -->
        </section>
